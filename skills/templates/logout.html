<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap | Logout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-2xl p-10 text-center max-w-md w-full">
    <h1 class="text-3xl font-bold text-teal-600 mb-4">Logging Out...</h1>
    <p class="text-slate-600 mb-6">Please wait while we securely log you out.</p>

    <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-teal-600 mx-auto mb-6"></div>

    <button onclick="goHome()" 
      class="bg-teal-600 text-white px-6 py-2 rounded-lg hover:bg-teal-700 transition">
      Go to Home
    </button>
  </div>

  <script>
    // Clear stored data
    localStorage.clear();

    // Redirect automatically after 2 seconds
    setTimeout(() => {
      window.location.href = "{% url 'skills:home' %}";
    }, 2000);

    function goHome() {
      window.location.href = "{% url 'skills:home' %}";
    }
  </script>

</body>
</html>
