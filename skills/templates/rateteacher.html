<!DOCTYPE html>
<html>
<head>
<title>Rate Teacher</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    height:80px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background-color:#14b8a6;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:#0f766e;
}

</style>

</head>

<body>

<div class="container">

<h2>Rate {{ teacher.username }}</h2>

<form method="POST">
{% csrf_token %}

<label>Rating (1-5)</label>

<select name="rating">
<option value="1">1 ⭐</option>
<option value="2">2 ⭐</option>
<option value="3">3 ⭐</option>
<option value="4">4 ⭐</option>
<option value="5">5 ⭐</option>
</select>

<br><br>

<textarea name="review" placeholder="Write review"></textarea>

<button type="submit">Submit Rating</button>

</form>

</div>

</body>
</html>
