{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile | SkillSwap</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 text-slate-800">

<section class="max-w-3xl mx-auto mt-10">

<div class="bg-white p-8 rounded-xl shadow">

<h2 class="text-3xl font-bold text-center mb-8">
Edit Profile
</h2>

<form method="POST">

{% csrf_token %}

<div class="space-y-5">

<div>
<label class="block mb-2 font-semibold">Bio</label>

<textarea name="bio"
class="w-full border rounded-lg p-3"
rows="4">{{ learner.bio }}</textarea>
</div>

<div>
<label class="block mb-2 font-semibold">
Skill I Can Teach
</label>

<input type="text"
name="skill_to_teach"
value="{{ learner.skill_to_teach }}"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="block mb-2 font-semibold">
Skill I Want to Learn
</label>

<input type="text"
name="skill_to_learn"
value="{{ learner.skill_to_learn }}"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="block mb-2 font-semibold">
Interests
</label>

<input type="text"
name="interests"
value="{{ learner.interests }}"
class="w-full border rounded-lg p-3">
</div>

</div>

<div class="mt-8 flex gap-4">

<button type="submit"
class="bg-teal-600 text-white px-6 py-3 rounded-lg">
Save Changes
</button>

<a href="{% url 'skills:learner_profile' %}"
class="bg-gray-400 text-white px-6 py-3 rounded-lg">
Cancel
</a>

</div>

</form>

</div>

</section>

</body>
</html>
