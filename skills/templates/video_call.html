<!DOCTYPE html>
<html>
<head>
    <title>Video Call</title>

    <script src="https://meet.jit.si/external_api.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900">

<div class="flex justify-between items-center p-4 bg-slate-800 text-white">

    <h1 class="text-2xl font-bold">
        Video Call with {{ receiver.username }}
    </h1>

    <a href="{% url 'skills:active_swaps' %}"
       class="bg-red-500 px-4 py-2 rounded-lg">

        End Call

    </a>

</div>

<div id="meet" class="w-full h-screen"></div>

<script>

    const domain = "meet.jit.si";

    const options = {
        roomName: "{{ room_name }}",
        width: "100%",
        height: "100%",
        parentNode: document.querySelector('#meet'),

        userInfo: {
            displayName: "{{ request.user.username }}"
        }
    };

    const api = new JitsiMeetExternalAPI(domain, options);

</script>

</body>
</html>
