<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | SkillSwap</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-teal-600 mb-6">
      Join SkillSwap
    </h2>

    <p class="text-center text-slate-500 mb-8">
      Create your account to start learning and teaching
    </p>

    <form class="space-y-5" action="home.html" method="POST">
      <input
        type="text"
        name="fullname"
        placeholder="Full Name"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
        required
      />

      <input
        type="email"
        name="email"
        placeholder="Email Address"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"
        required
      />

      <button
        type="submit"
        class="w-full bg-teal-600 text-white py-3 rounded-lg font-bold hover:bg-teal-700 transition">
        Create Account
      </button>
    </form>

    <p class="text-center text-slate-600 mt-6">
      Already have an account?
      <a href="{% url 'skills:login' %}" class="text-teal-600 font-semibold hover:underline">
        Login
      </a>
    </p>

  </div>

</body>
</html>
