<!DOCTYPE html>
<html>
<head>
<title>SkillSwap Chat</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:20px;
}

h2{
text-align:center;
margin-bottom:15px;
color:#0f766e;
}

#chat-box{
height:300px;
border:1px solid #ddd;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
border-radius:6px;
background:#f8fafc;
}

.message{
background:#0f766e;
color:white;
padding:8px 12px;
border-radius:8px;
margin-bottom:8px;
width:fit-content;
}

.input-area{
display:flex;
gap:10px;
}

#message-input{
flex:1;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f766e;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#115e59;
}

</style>

</head>

<body>

<div class="chat-container">

<h2>SkillSwap Chat</h2>

<div id="chat-box"></div>

<div class="input-area">
<input id="message-input" type="text" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const socket = new WebSocket('ws://127.0.0.1:8000/ws/chat/');

socket.onmessage = function(e){

let data = JSON.parse(e.data);

document.getElementById("chat-box").innerHTML +=
"<div class='message'>" + data.message + "</div>";

}

function sendMessage(){

let message = document.getElementById("message-input").value;

socket.send(JSON.stringify({
'message': message
}));

document.getElementById("message-input").value="";

}

</script>

</body>
</html>
